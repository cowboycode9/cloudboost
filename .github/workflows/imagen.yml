
name: Generate Images

on:
  workflow_run:
    workflows: ["Voiceover"]  # Replace with the actual name of your voiceover workflow
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write  # Allows pushing changes back

jobs:
  generate:
    runs-on: ubuntu-latest
    
    # Only run if the triggering workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-generativeai requests

      - name: Generate images inline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<EOF
          import os
          import re
          import json
          import time
          import random
          import google.generativeai as genai
          from google.api_core import exceptions

          # === Config ===
          api_key = os.getenv("GEMINI_API_KEY")
          genai.configure(api_key=api_key)

          IMAGES_DIR = "Images"
          VISUALS_JSON = "Visuals/visuals.json"

          os.makedirs(IMAGES_DIR, exist_ok=True)

          # === Debug: Check Access ===
          # This helps confirm if your key has access to Imagen
          print("🔍 Checking available models for this key...")
          try:
              has_imagen = False
              for m in genai.list_models():
                  if 'generate_content' in m.supported_generation_methods:
                      pass # Text models
                  if 'image' in m.name:
                      print(f"   - Found Image Model: {m.name}")
                      has_imagen = True
              if not has_imagen:
                  print("⚠️ No specific image generation models found in list_models(). You might not have access to Imagen 3 yet.")
          except Exception as e:
              print(f"⚠️ Could not list models: {e}")

          # === Find highest iN ===
          def find_highest_image_number():
              pattern = re.compile(r"i(\d+)\.png$")
              max_num = 0
              for fname in os.listdir(IMAGES_DIR):
                  match = pattern.match(fname)
                  if match:
                      num = int(match.group(1))
                      max_num = max(max_num, num)
              return max_num

          last_image_num = find_highest_image_number()
          next_image_num = last_image_num + 1
          print(f"Last image: i{last_image_num}. Next will be i{next_image_num}")

          # === Load visuals.json ===
          with open(VISUALS_JSON, "r") as f:
              visuals = json.load(f)

          available_prompts = sorted(visuals, key=lambda x: x["number"])
          prompts_to_generate = [item for item in available_prompts if item["number"] >= next_image_num]

          if not prompts_to_generate:
              print("✅ No new prompts to generate. Exiting.")
              exit(0)

          print(f"🔢 Generating {len(prompts_to_generate)} images...")

          # === Generate images with retry ===
          # We use the official model name. If this fails, your key likely doesn't have access.
          imagen_model = genai.ImageGenerationModel("imagen-3.0-generate-001")

          for item in prompts_to_generate:
              number = item["number"]
              prompt = item["prompt"]

              print(f"🔄 Generating i{number}...")

              MAX_RETRIES = 3
              generated_successfully = False

              for attempt in range(1, MAX_RETRIES + 1):
                  try:
                      response = imagen_model.generate_images(
                          prompt=prompt,
                          number_of_images=1,
                          aspect_ratio="16:9",
                          safety_filter="block_only_high",
                      )
                      
                      # Save the image
                      filename = os.path.join(IMAGES_DIR, f"i{number}.png")
                      response[0].save(filename)
                      print(f"✅ Saved: {filename}")
                      generated_successfully = True
                      break

                  except exceptions.ResourceExhausted:
                      wait = 10 * attempt
                      print(f"⚠️ Rate limited (429). Waiting {wait}s...")
                      time.sleep(wait)
                  except exceptions.NotFound:
                      print(f"❌ Error: Model 'imagen-3.0-generate-001' not found for this API key.")
                      break
                  except Exception as e:
                      print(f"❌ Error on attempt {attempt}: {e}")
                      if attempt < MAX_RETRIES:
                          time.sleep(5)
                      else:
                          print(f"⚠️ Failed to generate i{number}")

              if generated_successfully:
                  delay = random.randint(10, 15)
                  print(f"⏳ Waiting {delay}s...")
                  time.sleep(delay)
              else:
                  # If we fail (e.g. no access), break the loop to avoid spamming errors
                  print("⚠️ Stopping generation due to errors.")
                  exit(1)

          print(f"🎉 Finished generating.")
          EOF

      - name: Configure Git
        run: |
          git config --global user.name "intellect9"
          git config --global user.email "intellectra9@outlook.com"

      - name: Commit and push generated images
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git stash --include-untracked
          git pull origin main --rebase || echo "No rebase needed"
          git stash pop || true

          git add Images/
          timestamp=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %H:%M:%S IST")
          git commit -m "🖼️ Generated images: ${timestamp}" || echo "No changes to commit"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git
          git push origin HEAD:main


