name: Generate Images

on:
  workflow_run:
    workflows: ["Voiceover"]  # Replace with the actual name of your voiceover workflow
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write  # Allows pushing changes back

jobs:
  generate:
    runs-on: ubuntu-latest
    
    # Only run if the triggering workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-genai pillow

      - name: Generate images inline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<EOF
          import os
          import re
          import json
          import time
          import random
          import io
          from google import genai
          from google.genai import types
          from PIL import Image

          # === Config ===
          # The client automatically picks up the API key from the GEMINI_API_KEY environment variable
          client = genai.Client()
          
          # Using the model ID from your snippet
          MODEL_ID = "imagen-3.0-generate-001" 

          IMAGES_DIR = "Images"
          VISUALS_JSON = "Visuals/visuals.json"

          os.makedirs(IMAGES_DIR, exist_ok=True)

          # === Find highest iN ===
          def find_highest_image_number():
              pattern = re.compile(r"i(\d+)\.png$")
              max_num = 0
              for fname in os.listdir(IMAGES_DIR):
                  match = pattern.match(fname)
                  if match:
                      num = int(match.group(1))
                      max_num = max(max_num, num)
              return max_num

          last_image_num = find_highest_image_number()
          next_image_num = last_image_num + 1
          print(f"Last image: i{last_image_num}. Next will be i{next_image_num}")

          # === Load visuals.json ===
          with open(VISUALS_JSON, "r") as f:
              visuals = json.load(f)

          available_prompts = sorted(visuals, key=lambda x: x["number"])
          prompts_to_generate = [item for item in available_prompts if item["number"] >= next_image_num]

          if not prompts_to_generate:
              print("✅ No new prompts to generate. Exiting.")
              exit(0)

          print(f"🔢 Generating {len(prompts_to_generate)} images...")

          # === Generate images loop ===
          for item in prompts_to_generate:
              number = item["number"]
              prompt = item["prompt"]

              print(f"🔄 Generating i{number}...")

              MAX_RETRIES = 3
              
              for attempt in range(1, MAX_RETRIES + 1):
                  try:
                      # Using the dict config structure you provided
                      result = client.models.generate_images(
                          model=MODEL_ID,
                          prompt=prompt,
                          config=dict(
                              number_of_images=1,
                              output_mime_type="image/png",
                              aspect_ratio="16:9", 
                          )
                      )

                      # Handle the generated image
                      if result.generated_images:
                          # We take the first image
                          generated_image = result.generated_images[0]
                          
                          # Depending on SDK version, .image might be the PIL object or bytes wrapper
                          # We try your snippet's approach with a BytesIO safety wrapper
                          if hasattr(generated_image.image, 'image_bytes'):
                              image_data = generated_image.image.image_bytes
                              image = Image.open(io.BytesIO(image_data))
                          else:
                              # Fallback if the SDK returns the PIL object directly
                              image = generated_image.image

                          filename = os.path.join(IMAGES_DIR, f"i{number}.png")
                          image.save(filename)
                          print(f"✅ Saved: {filename}")
                          break 
                      else:
                          print(f"⚠️ No image returned for i{number}")
                          break

                  except Exception as e:
                      print(f"❌ Error on attempt {attempt}: {e}")
                      if attempt < MAX_RETRIES:
                          wait = 10 * attempt
                          print(f"⏳ Waiting {wait}s before retry...")
                          time.sleep(wait)
                      else:
                          print(f"⚠️ Failed to generate i{number} after retries.")

              delay = random.randint(10, 15)
              print(f"⏳ Waiting {delay}s...")
              time.sleep(delay)

          print(f"🎉 Finished generating {len(prompts_to_generate)} images.")
          EOF

      - name: Configure Git
        run: |
          git config --global user.name "intellect9"
          git config --global user.email "intellectra9@outlook.com"

      - name: Commit and push generated images
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git stash --include-untracked
          git pull origin main --rebase || echo "No rebase needed"
          git stash pop || true

          git add Images/
          timestamp=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %H:%M:%S IST")
          git commit -m "🖼️ Generated images: ${timestamp}" || echo "No changes to commit"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git
          git push origin HEAD:main

                          time.sleep(wait)
                      else:
                          print(f"⚠️ Failed to generate i{number} after retries.")

              delay = random.randint(10, 15)
              print(f"⏳ Waiting {delay}s...")
              time.sleep(delay)

          print(f"🎉 Finished generating {len(prompts_to_generate)} images.")
          EOF

      - name: Configure Git
        run: |
          git config --global user.name "intellect9"
          git config --global user.email "intellectra9@outlook.com"

      - name: Commit and push generated images
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git stash --include-untracked
          git pull origin main --rebase || echo "No rebase needed"
          git stash pop || true

          git add Images/
          timestamp=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %H:%M:%S IST")
          git commit -m "🖼️ Generated images: ${timestamp}" || echo "No changes to commit"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git
          git push origin HEAD:main


